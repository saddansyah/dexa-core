version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: dexa-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: dexa
      MYSQL_DATABASE: dexa_db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  db-data:
    name: db-data
    external: true
